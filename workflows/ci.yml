name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -e ".[dev]"

      - name: Run Ruff lint
        working-directory: backend
        run: python -m ruff check .

      - name: Check Ruff formatting
        working-directory: backend
        run: python -m ruff format --check .

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

      - name: Check research CLI entry points
        run: |
          python -m verilogic_ns_api.datasets --help
          python -m verilogic_ns_api.evaluation --help
          python -m verilogic_ns_api.baselines --help

      - name: Run synthetic dataset and evaluation smoke checks
        run: |
          python -m verilogic_ns_api.datasets inspect proofwriter --data-source backend/tests/fixtures/proofwriter --variant depth-1
          python -m verilogic_ns_api.evaluation run --config experiments/configs/proofwriter-smoke.yaml
          python -m verilogic_ns_api.baselines smoke --condition direct --output-root results/ci-baselines
          python -m verilogic_ns_api.baselines smoke --condition few_shot --output-root results/ci-baselines

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend lint
        working-directory: frontend
        run: pnpm lint

      - name: Run frontend type check
        working-directory: frontend
        run: pnpm type-check

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: pnpm build
